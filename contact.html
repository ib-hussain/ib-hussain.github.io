<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- <link rel="icon" type="image/png" href="pictures/ib.jpg" /> -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Me</title>
    <link rel="stylesheet" href="css/contact.css" />
  </head>
  <body>
    <script src="js/layout.js"></script>
    <link rel="html" href="navbar.html" />

    <div class="container">
      <h1 class="headingg">Get in Touch</h1>
      <form class="form-fill">
        <div class="form-left">
          
          <label for="name" >Name</label>
          <input type="text" id="name" name="name" 
            placeholder="Your full name..." required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="e-mailman"
            placeholder="Your email address..."  required />
        </div>

        <div class="form-right">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="7"
            placeholder="Write your message here..." required ></textarea>
          <button type="submit" class="submittion" id="submittion">Send Message</button>
        </div>

      </form>
    </div>

    <link rel="html" href="footer.html" />
    <script src="js/contact.js"></script>
  </body>
</html>
